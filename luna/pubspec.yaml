name: luna
description: Luna — Period & Cycle Tracker. India-first, local-first, AI-integrated.
publish_to: 'none'

version: 1.0.6+7

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── State management ────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.4.1

  # ── Navigation ──────────────────────────────────────
  go_router: ^13.2.0

  # ── Local database ──────────────────────────────────
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.4
  path_provider: ^2.1.3
  path: ^1.9.0

  # ── Settings / preferences ──────────────────────────
  hive_flutter: ^1.1.0

  # ── UI & animations ─────────────────────────────────
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  lottie: ^3.1.2

  # ── Notifications ────────────────────────────────────
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4

  # ── Security ─────────────────────────────────────────
  flutter_secure_storage: ^9.2.2

  # ── Permissions ──────────────────────────────────────
  permission_handler: ^11.3.1

  # ── Internationalisation ─────────────────────────────
  intl: ^0.20.2

  # ── In-app update system ─────────────────────────────
  package_info_plus: ^8.0.2
  dio: ^5.6.0
  open_filex: ^4.7.0

  # ── Firebase (auth + cloud sync — active when kFirebaseEnabled = true) ───
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.3

  # ── Claude API (active when kClaudeEnabled = true) ───
  http: ^1.2.1

  # ── Data export + share sheet ────────────────────────
  share_plus: ^10.1.4

  # ── Charts ───────────────────────────────────────────
  fl_chart: ^0.69.0

  # ── Utilities ────────────────────────────────────────
  freezed_annotation: ^2.4.1
  credential_manager: ^2.0.8
  home_widget: ^0.9.3
  pdf: ^3.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # ── Code generation ──────────────────────────────────
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.3
  drift_dev: ^2.20.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  generate: true   # enables flutter gen-l10n for ARB localisation files

  assets:
    - assets/lottie/
    - assets/data/
    - assets/images/

  # Fonts are loaded via google_fonts package at runtime — no local font files needed
